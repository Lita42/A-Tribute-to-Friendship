<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Antarctic Ice-Breaking Office, Shanghai Branch 南极破冰驻沪办
</title>


<style>


body{

margin:0;

background:#f7f3ea;

font-family:"Microsoft YaHei";

color:#233746;

}


.container{

max-width:700px;

margin:auto;

padding:25px;

}


.card{

background:white;

padding:25px;

border-radius:20px;

margin-bottom:20px;

box-shadow:0 5px 20px #ddd;

}


.logo{

text-align:center;

font-size:70px;

}


.logo img{

max-width:180px;

height:auto;

}


button{

background:#29465b;

color:white;

border:0;

padding:12px 20px;

border-radius:12px;

cursor:pointer;

}


button:hover{

opacity:0.85;

}


input,textarea{

width:100%;

padding:12px;

margin:8px 0;

box-sizing:border-box;

border-radius:10px;

border:1px solid #ccc;

}


.hidden{

display:none;

}


.timeline{

border-left:3px solid #9ac4dd;

padding-left:20px;

}


.task{

background:#fff;

padding:15px;

border-radius:15px;

margin:15px 0;

}



.delete-btn{

background:#8b3a3a;

margin-top:10px;

}



</style>


</head>



<body>



<div class="container">



<div id="login" class="card">


<div class="logo">

<img src="logo-final.jpg">

</div>


<h2 align="center">

南极破冰驻沪办<br>
Antarctic Ice-Breaking Office, Shanghai Branch

</h2>


<p align="center">

员工认证系统

</p>



<input id="username"
placeholder="员工ID">


<input id="password"
type="password"
placeholder="密码">



<button onclick="login()">

进入企鹅档案库

</button>



</div>





<div id="main"
class="hidden">



<div class="logo">

<img src="logo-final.jpg">

</div>



<h1 align="center">

南极破冰驻沪办

</h1>


<p align="center">

Antarctic Icebreaking Office<br>

Shanghai Branch

</p>





<div class="card">


<h3>

这里保存了一只企鹅参与过的人类友情任务。

</h3>


<p>

📦 已完成任务：

<span id="count">
0
</span>

</p>


</div>





<div class="card">


<h2>

新增任务

</h2>



<input id="date"
placeholder="日期，例如 2026.07.10">


<input id="title"
placeholder="任务名称">


<textarea id="content"
placeholder="企鹅任务日志"
oninput="autoResize(this)">
</textarea>



<input id="photo"
placeholder="图片地址">




<button onclick="addTask()">

上传任务

</button>



</div>





<div class="card">


<h2>

🐾 企鹅执行时间轴

</h2>


<div id="timeline"
class="timeline">

</div>


</div>



<button onclick="logout()">

退出办公室

</button>



</div>



</div>








<script>



let tasks =
JSON.parse(
localStorage.getItem("penguinTasks")
||
"[]"
);


function autoResize(element){

element.style.height = "auto";

element.style.height =
element.scrollHeight + "px";

}


function login(){


let u =
document.getElementById("username").value;


let p =
document.getElementById("password").value;



if(
u==="ER79"
&&
p==="7799"

){


document.getElementById("login")
.style.display="none";


document.getElementById("main")
.classList.remove("hidden");


showTasks();


}

else{


alert(
"企鹅总部认证失败"
);


}


}






function addTask(){


let task={


date:
document.getElementById("date").value,


title:
document.getElementById("title").value,


content:
document.getElementById("content").value,


photo:
document.getElementById("photo").value


};




tasks.unshift(task);



localStorage.setItem(

"penguinTasks",

JSON.stringify(tasks)

);



showTasks();




}








function showTasks(){


let box =
document.getElementById("timeline");


box.innerHTML="";



tasks.forEach((t,index)=>{



box.innerHTML+=`


<div class="task">


<h3>

${t.date}

</h3>


<h2>

${t.title}

</h2>


<p>

${t.content}

</p>



${t.photo?

"<img src='"+t.photo+"' width='100%'>"

:

""

}



<br>


<button class="delete-btn"

onclick="deleteTask(${index})">

删除此任务

</button>



</div>


`;



});



document.getElementById("count")
.innerHTML =
tasks.length;



}







function deleteTask(index){


let result =
confirm(

"确定删除这个企鹅任务吗？\n删除后无法恢复。"

);



if(result){



tasks.splice(index,1);



localStorage.setItem(

"penguinTasks",

JSON.stringify(tasks)

);



showTasks();



}



}







function logout(){


location.reload();



}



</script>



</body>

</html>
