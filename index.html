<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Antarctic Ice-Breaking Office, Shanghai Branch 南极破冰驻沪办
</title>


<style>


body{

margin:0;

background:#f7f3ea;

font-family:"Microsoft YaHei";

color:#233746;

}


.container{

max-width:700px;

margin:auto;

padding:25px;

}


.card{

background:white;

padding:25px;

border-radius:20px;

margin-bottom:20px;

box-shadow:0 5px 20px #ddd;

}


.logo{

text-align:center;

font-size:70px;

}


.logo img{

max-width:180px;

height:auto;

}


button{

background:#29465b;

color:white;

border:0;

padding:12px 20px;

border-radius:12px;

cursor:pointer;

}


button:hover{

opacity:0.85;

}


button:disabled{

opacity:0.5;

cursor:not-allowed;

}


input,textarea{

width:100%;

padding:12px;

margin:8px 0;

box-sizing:border-box;

border-radius:10px;

border:1px solid #ccc;

}


.hidden{

display:none;

}


.timeline{

border-left:3px solid #9ac4dd;

padding-left:20px;

}


.task{

background:#fff;

padding:15px;

border-radius:15px;

margin:15px 0;

}



.delete-btn{

background:#8b3a3a;

margin-top:10px;

}


.status{

text-align:center;

font-size:14px;

color:#8a8a8a;

margin:5px 0 15px 0;

}


.status.error{

color:#b23a3a;

}



</style>


</head>



<body>



<div class="container">



<div id="login" class="card">


<div class="logo">

<img src="logo-final.jpg">

</div>


<h2 align="center">

南极破冰驻沪办<br>
Antarctic Ice-Breaking Office, Shanghai Branch

</h2>


<p align="center">

员工认证系统

</p>



<input id="username"
placeholder="员工ID">


<input id="password"
type="password"
placeholder="密码">



<button onclick="login()">

进入企鹅档案库

</button>



</div>





<div id="main"
class="hidden">



<div class="logo">

<img src="logo-final.jpg">

</div>



<h1 align="center">

南极破冰驻沪办

</h1>


<p align="center">

Antarctic Icebreaking Office<br>

Shanghai Branch

</p>


<p id="syncStatus" class="status">
云端同步中...
</p>




<div class="card">


<h3>

这里保存了一只企鹅参与过的人类友情任务。

</h3>


<p>

📦 已完成任务：

<span id="count">
0
</span>

</p>


</div>





<div class="card">


<h2>

新增任务

</h2>



<input id="date"
placeholder="日期，例如 2026.07.10">


<input id="title"
placeholder="任务名称">


<textarea id="content"
placeholder="企鹅任务日志"
oninput="autoResize(this)">
</textarea>



<input id="photo"
placeholder="图片地址">




<button id="addBtn" onclick="addTask()">

上传任务

</button>



</div>





<div class="card">


<h2>

🐾 企鹅执行时间轴

</h2>


<div id="timeline"
class="timeline">

</div>


</div>



<button onclick="logout()">

退出办公室

</button>



</div>



</div>




<script>


// ===== JSONBin 配置 =====

const BIN_ID = "6a53b40cf5f4af5e298490c5";

const API_KEY = "$2a$10$CLgGEi5taFIEyJvW9zoHU.DD0i2d2vZtH1Wr7qXtQDIl2ud9RwoZm";

const API_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;


let tasks = [];



function autoResize(element){

element.style.height = "auto";

element.style.height =
element.scrollHeight + "px";

}



function setStatus(text, isError){

let el = document.getElementById("syncStatus");

el.textContent = text;

el.className = isError ? "status error" : "status";

}



function login(){


let u =
document.getElementById("username").value;


let p =
document.getElementById("password").value;



if(
u==="ER79"
&&
p==="7799"

){


document.getElementById("login")
.style.display="none";


document.getElementById("main")
.classList.remove("hidden");


loadTasks();


}

else{


alert(
"企鹅总部认证失败"
);


}


}




// ===== 从云端读取任务 =====

async function loadTasks(){


setStatus("云端同步中...", false);


try{


let res = await fetch(API_URL + "/latest", {

headers: { "X-Master-Key": API_KEY }

});


if(!res.ok){

throw new Error("HTTP " + res.status);

}


let data = await res.json();


tasks = (data.record && data.record.tasks) ? data.record.tasks : [];


setStatus("云端同步成功 ✓", false);


showTasks();


}

catch(err){


setStatus("云端读取失败，请检查网络后重试", true);


console.error(err);


}


}




// ===== 保存任务到云端 =====

async function saveTasks(){


document.getElementById("addBtn").disabled = true;


setStatus("正在保存到云端...", false);


try{


let res = await fetch(API_URL, {

method: "PUT",

headers: {

"Content-Type": "application/json",

"X-Master-Key": API_KEY

},

body: JSON.stringify({ tasks: tasks })

});


if(!res.ok){

throw new Error("HTTP " + res.status);

}


setStatus("云端同步成功 ✓", false);


}

catch(err){


setStatus("保存失败，请检查网络后重试", true);


console.error(err);


}

finally{


document.getElementById("addBtn").disabled = false;


}


}




async function addTask(){


let task={


date:
document.getElementById("date").value,


title:
document.getElementById("title").value,


content:
document.getElementById("content").value,


photo:
document.getElementById("photo").value


};




tasks.unshift(task);



showTasks();


await saveTasks();



document.getElementById("date").value = "";

document.getElementById("title").value = "";

document.getElementById("content").value = "";

document.getElementById("photo").value = "";



}








function showTasks(){


let box =
document.getElementById("timeline");


box.innerHTML="";



tasks.forEach((t,index)=>{



box.innerHTML+=`


<div class="task">


<h3>

${t.date}

</h3>


<h2>

${t.title}

</h2>


<p>

${t.content}

</p>



${t.photo?

"<img src='"+t.photo+"' width='100%'>"

:

""

}



<br>


<button class="delete-btn"

onclick="deleteTask(${index})">

删除此任务

</button>



</div>


`;



});



document.getElementById("count")
.innerHTML =
tasks.length;



}







async function deleteTask(index){


let result =
confirm(

"确定删除这个企鹅任务吗？\n删除后无法恢复。"

);



if(result){



tasks.splice(index,1);



showTasks();


await saveTasks();



}



}







function logout(){


location.reload();



}



</script>



</body>

</html>
